<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPL 2026 | Player Records</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo-container">
                <img src="assets/CPL.svg" alt="CPL Logo" class="logo">
            </a>
            <button class="menu-toggle" id="menu-toggle"><span></span></button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="stats.html">Stats & Points Table</a></li>
                <li><a href="players.html">Player Records</a></li>
                <li><a href="admin.html" class="nav-admin-btn">Admin Portal</a></li>
            </ul>
        </div>
    </nav>

    <header id="players-header">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Player Records</h1>
            <p>STATISTICS • ACHIEVEMENTS • HALL OF FAME</p>
        </div>
    </header>

    <main class="container">
        <!-- Player Records Section -->
        <section id="player-records">
            <div class="section-header">
                <h2 class="section-title"><span>Statistics</span>Hall of Fame</h2>
                <div class="interactive-controls">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="player-search" placeholder="Search by name or email...">
                    </div>
                </div>
            </div>
            
            <div class="records-grid" id="players-list">
                <!-- Dynamic Content -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <img src="assets/CPL.svg" alt="CPL Logo" class="footer-logo">
            <p class="footer-text">&copy; 2026 Cricket Premier League. Designed for Excellence.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
