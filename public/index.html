<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPL 2026 | Ultimate Cricket League</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo-container">
                <img src="assets/CPL.svg" alt="CPL Logo" class="logo">
            </a>
            <button class="menu-toggle" id="menu-toggle"><span></span></button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="stats.html">Stats & Points Table</a></li>
                <li><a href="players.html">Player Records</a></li>
                <li><a href="admin.html" class="nav-admin-btn">Admin Portal</a></li>
            </ul>
        </div>
    </nav>

    <header id="home">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>CPL 2026</h1>
            <p>PRECISION • PASSION • POWER</p>
        </div>
    </header>

    <main class="container">
        <!-- Captains Section -->
        <section id="captains">
            <div class="section-header">
                <h2 class="section-title"><span>Tournament</span>Meet the Captains</h2>
            </div>
            <div class="captains-grid" id="captains-list">
                <!-- Dynamic Content -->
            </div>
        </section>

        <!-- Top 5 Players Section -->
        <section id="top-players">
            <div class="section-header">
                <h2 class="section-title"><span>Hall of Fame</span>Legends of CPL</h2>
            </div>
            <div class="top-players-grid" id="top-players-list">
                <!-- Dynamic Content -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <img src="assets/CPL.svg" alt="CPL Logo" class="footer-logo">
            <p class="footer-text">&copy; 2026 Cricket Premier League. Designed for Excellence.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
